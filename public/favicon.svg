<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7A2415"/>
      <stop offset="100%" stop-color="#4A120B"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F3E5AB"/>
      <stop offset="50%" stop-color="#C89B3C"/>
      <stop offset="100%" stop-color="#996E1E"/>
    </linearGradient>
  </defs>

  <!-- Background Circle -->
  <rect width="128" height="128" rx="36" fill="url(#bgGrad)"/>
  <rect x="6" y="6" width="116" height="116" rx="30" fill="none" stroke="url(#goldGrad)" stroke-width="4" opacity="0.6"/>

  <!-- Tamil Letter "திரு" / Decorative Emblem -->
  <g fill="url(#goldGrad)">
    <!-- Palm Leaf Decorative Scroll Top -->
    <path d="M40 32 C 55 26, 73 26, 88 32 C 92 34, 88 38, 84 37 C 72 32, 56 32, 44 37 C 40 38, 36 34, 40 32 Z"/>
    
    <!-- Stylized Tamil Letter "திரு" Text -->
    <text x="64" y="86" font-family="'Noto Serif Tamil', 'Georgia', serif" font-size="58" font-weight="bold" text-anchor="middle" fill="url(#goldGrad)">திரு</text>
  </g>
</svg>